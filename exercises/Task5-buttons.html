<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Button Styling Collection</title>
    <link rel="stylesheet" href="../styles/Task5-buttons.css">
</head>
<body>
    <header class="main-header"><h1>Button Styling Collection</h1></header>
    <div class="gallery-wrapper">
        <section class="btn-card">
            <h2>1. Different Sizes</h2>
            <div class="btn-grid"><button class="btn btn-xs">XS</button><button class="btn btn-sm">Small</button><button class="btn btn-md">Medium</button><button class="btn btn-lg">Large</button><button class="btn btn-xl">XL</button></div>
        </section>
        <section class="btn-card">
            <h2>2. Colors & Gradients</h2>
            <div class="btn-grid"><button class="btn btn-primary">Primary</button><button class="btn btn-success">Success</button><button class="btn btn-danger">Danger</button><button class="btn btn-grad1">Sunset</button><button class="btn btn-grad2">Ocean</button></div>
        </section>
        <section class="btn-card">
            <h2>3. Shapes</h2>
            <div class="btn-grid"><button class="btn btn-square">Square</button><button class="btn btn-round">Rounded</button><button class="btn btn-pill">Pill</button><button class="btn btn-circle">Circle</button><button class="btn btn-outline">Outline</button></div>
        </section>
        <section class="btn-card">
            <h2>4. Transition Effects</h2>
            <div class="btn-grid"><button class="btn btn-grow">Grow</button><button class="btn btn-rotate">Rotate</button><button class="btn btn-slide">Slide</button><button class="btn btn-bounce">Bounce</button><button class="btn btn-fade">Fade</button></div>
        </section>
        <section class="btn-card">
            <h2>5. Shadows & Glow</h2>
            <div class="btn-grid"><button class="btn btn-shadow">Shadow</button><button class="btn btn-neon">Neon</button><button class="btn btn-glow">Glow</button><button class="btn btn-soft">Soft</button><button class="btn btn-hard">Hard</button></div>
        </section>
        <section class="btn-card">
            <h2>6. States</h2>
            <div class="btn-grid"><button class="btn btn-primary">Normal</button><button class="btn btn-primary" disabled>Disabled</button><button class="btn btn-success" disabled>Disabled</button><button class="btn btn-danger" disabled>Disabled</button><button class="btn btn-primary">Focus Me</button></div>
        </section>
    </div>
</body>
</html>
