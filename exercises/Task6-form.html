<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" href="../styles/Task6-form.css">
</head>
<body>
    <div class="form-container">
        <h2>Create Account</h2>
        <p class="subtitle">Fill in the details below to register</p>
        <form id="registrationForm">
            <div class="row">
                <div class="form-group half">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
                <div class="form-group half">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last Name">
                </div>
            </div>
        
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="24pwbcs1204@uetpeshawar.edu.pk" class="success">
                <span class="success-msg">Email looks good!</span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Select Course</label>
                <select>
                    <option>Computer Science</option>
                    <option>Software Engineering</option>
                </select>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" name="gender"> Male <input type="radio" name="gender"> Female
                </div>
            </div>
            <div class="form-group">
                <label>About Yourself</label>
                <textarea rows="3"></textarea>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" checked> I agree to the Terms and Conditions
            </div>
            <div class="btn-row">
                <button type="reset" class="btn-secondary">Reset</button>
                <button type="submit" class="btn">Create Account</button>
            </div>
        </form>
    </div>
</body>
</html>
