<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../styles/Task9-transform.css">
</head>
<body style="background: #0f172a; color: white; padding: 40px; font-family: sans-serif;">
    <h1>CSS Transform Gallery</h1>
    <section>
        <h2>BASIC 2D TRANSFORMS</h2>
        <div class="grid">
            <div class="box translate">Translate</div>
            <div class="box rotate">Rotate</div>
            <div class="box scale">Scale</div>
            <div class="box skew-x">Skew X</div>
            <div class="box skew-y">Skew Y</div>
            <div class="box combined">Combined</div>
        </div>
    </section
    <section>
        <h2>3D TRANSFORM EFFECTS</h2>
        <div class="grid">
            <div class="box rotate-x">Rotate X</div>
            <div class="box rotate-y">Rotate Y</div>
            <div class="box rotate-3d">Rotate 3D</div>
            <div class="box perspective">Perspective</div>
        </div>
    </section>
    <section>
    <h2>TRANSITION ANIMATIONS (HOVER!)</h2>
    <div class="grid">
        <div class="box full-spin">Full Spin</div>
        <div class="box pulse">Pulse</div>
        <div class="box wobble">Wobble</div>
        <div class="box rubber-band">Rubber Band</div>
        <div class="box swing">Swing</div>
    </div>
</section>
</body>
</html>
