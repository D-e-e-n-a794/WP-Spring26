<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Image Gallery</title>
    <link rel="stylesheet" href="../styles/Task4-images.css">
</head>
<body>
    <header class="main-header">
        <h1>Image Styling Portfolio</h1>
    </header>

    <div class="gallery-wrapper">
        <section class="img-card">
            <h2>1. Shapes (Rounded & Circular)</h2>
            <div class="gallery-row">
                <img src="../images/PIC.jpg"><img src="../images/PIC.jpg" class="img-rounded"><img src="../images/PIC.jpg" class="img-circle"><img src="../images/PIC.jpg" class="img-squircle"><img src="../images/PIC.jpg">
            </div>
        </section>
        <section class="img-card">
            <h2>2. Borders & Shadows</h2>
            <div class="gallery-row">
                <img src="../images/PIC.jpg" class="b-thin"><img src="../images/PIC.jpg" class="b-thick"><img src="../images/PIC.jpg" class="b-double"><img src="../images/PIC.jpg" class="shadow-soft"><img src="../images/PIC.jpg" class="shadow-hard">
            </div>
        </section>
        <section class="img-card">
            <h2>3. Hover Effects & Transitions</h2>
            <div class="gallery-row">
                <img src="../images/PIC.jpg" class="h-zoom"><img src="../images/PIC.jpg" class="h-rotate"><img src="../images/PIC.jpg" class="h-gray"><img src="../images/PIC.jpg" class="h-opacity"><img src="../images/PIC.jpg" class="h-blur">
            </div>
        </section>
        <section class="img-card">
            <h2>4. CSS Filters</h2>
            <div class="gallery-row">
                <img src="../images/PIC.jpg" class="f-gray"><img src="../images/PIC.jpg" class="f-sepia"><img src="../images/PIC.jpg" class="f-bright"><img src="../images/PIC.jpg" class="f-hue"><img src="../images/PIC.jpg" class="f-invert">
            </div>
        </section>
        <section class="img-card">
            <h2>5. Image Overlays</h2>
            <div class="gallery-row">
                <div class="overlay-box"><img src="../images/PIC.jpg"><div class="overlay">Text 1</div></div>
                <div class="overlay-box"><img src="../images/PIC.jpg"><div class="overlay">Text 2</div></div>
                <div class="overlay-box"><img src="../images/PIC.jpg"><div class="overlay">Text 3</div></div>
                <div class="overlay-box"><img src="../images/PIC.jpg"><div class="overlay">Text 4</div></div>
                <div class="overlay-box"><img src="../images/PIC.jpg"><div class="overlay">Text 5</div></div>
            </div>
        </section>
    </div>
</body>
</html>
